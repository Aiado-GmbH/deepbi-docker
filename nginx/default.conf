# Append charset=utf-8 to all applicable text responses
charset utf-8;
charset_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    text/html
    text/xml
    application/xml;

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options nosniff always;

    # ------------------------------------------------------------------ #
    # Static assets — served directly from the webpack dist directory.   #
    # The named volume "static_assets" is mounted at /static inside this  #
    # container and populated by the app container on first start.        #
    # ------------------------------------------------------------------ #
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;

        # Fonts — explicit types ensure browser loads them (supplements built-in types)
        types {
            font/woff                           woff;
            font/woff2                          woff2;
            font/ttf                            ttf;
            font/otf                            otf;
            application/vnd.ms-fontobject       eot;
            image/svg+xml                       svg;
            image/png                           png;
            image/jpeg                          jpg jpeg;
            image/gif                           gif;
            text/css                            css;
            application/javascript              js;
        }

        location ~* \.(woff2?|ttf|otf|eot)$ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, immutable" always;
            expires 365d;
        }
    }

    # ------------------------------------------------------------------ #
    # Everything else → Gunicorn (app server)                            #
    # ------------------------------------------------------------------ #
    location / {
        proxy_pass         http://server:8338;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket upgrade support (for /chat/ socket path)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
